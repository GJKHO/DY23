<!doctype html>
<html lang="en">

<head>
       <meta charset="utf-8" />
    <meta name="viewport"
        content="viewport-fit=cover,width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,shrink-to-fit=no,user-scalable=no" />
    <title>Game Core</title>
    <style>
        :root {
            --sat: env(safe-area-inset-top);
            --sar: env(safe-area-inset-right);
            --sab: env(safe-area-inset-bottom);
            --sal: env(safe-area-inset-left);
        }

        html {
            width: 100%;
            height: 100%;
            font-size: 18px;
            scroll-behavior: smooth;
            font-family: Segoe UI Historic, Segoe UI, Helvetica, Arial, sans-serif;
            background-color: #191919;
        }

        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            color: white;
            background: transparent;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100%;
            position: absolute;
            background-image: url(./assets/svgs/background.svg);
        }


        canvas {
            max-height: 92%;
            max-width: 100%;
            /* object-fit: contain; */
            /* position: relative; */
            /* transform: translate(-50%, -50%);
            left: 50%;
            top: 50%; */
            box-shadow: rgb(0 0 0 / 10%) 0px 0px 16px 16px;

            bottom:8%;height:auto;width:100%;display:block
        }

        #capture {
            display: none;
        }

        #lds-dual-ring {
            display: block;
            width: 64px;
            height: 64px;
            margin: 0px auto;
            border-radius: 50%;
            border: 6px solid #fff;
            border-color: #fff transparent #fff transparent;
            animation: lds-dual-ring 1.2s linear infinite;
            -webkit-animation: lds-dual-ring 1.2s linear infinite;
        }

        #lds-text {
            text-align: center;
            -webkit-text-align: center;
            margin-top: 30px;
            font-size: 1.2rem;
        }

        #lds-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            -webkit-transform: translate(-50%, -50%);
        }

        @keyframes lds-dual-ring {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        div[hidden] {
            display: none !important;
        }
    </style>
    <link href="sdk.bundle.js" rel="preload" as="script" />
    <link href="vendors.bundle.js" rel="preload" as="script" />
    <link href="engine.bundle.js" rel="preload" as="script" />
    <link href="game.bundle.js" rel="preload" as="script" />

    <!-- <link href="https://www.googletagmanager.com/gtag/js?id=G-TX3HFRNJDT" rel="preload" as="script" /> -->
    <script>
        window.dataLayer = window.dataLayer || [];

        function gtag() {
            dataLayer.push(arguments);
        }
        window.__GA_CONFIG = {
            GAME_NAME: 'Game Core',
            GA_MEASUREMENT_ID: 'G-TX3HFRNJDT',
            BUILD_VERSION: '14',
        }
    </script>
    <script src="./games/sdk/v2"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        #tg-ad-layer {
            position: fixed;
            bottom: 16px;
            left: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            pointer-events: none;
        }
        #tg-reward-btn {
            pointer-events: auto;
            font-size: 15px;
            padding: 10px 18px;
            background: linear-gradient(135deg, #00b4d8, #0096c7);
            color: #fff;
            border: none;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.5);
            cursor: pointer;
            display: none;
        }
        #tg-reward-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #tg-score-toast {
            pointer-events: none;
            font-size: 20px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 8px #000;
            display: none;
            animation: floatUp 1.2s ease forwards;
        }
        @keyframes floatUp {
            0%   { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-60px); }
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <div id="lds-content" hidden>
        <div id="lds-dual-ring"></div>
        <div id="lds-text"><span id="lds-percent">0</span>% loaded</div>
    </div>
    <script src="sdk.bundle.js"></script>
    <script>
        "use strict";
        // 提前设置 visitorId，避免 games/sdk/v2 尝试动态 import fingerprint2.min.js
        // 该文件路径错误会导致 Promise 永久挂起，游戏一直转圈无法加载
        if (window.visitorId === "null" || window.visitorId === undefined) {
            window.visitorId = 'u_' + Math.random().toString(36).substring(2) + Date.now().toString(36);
        }

        function initFbInstant() {
            var t = 1;
            FBInstant.initializeAsync().then((function () {
                window.focus();
                var n = FBInstant.player.getID();
                FBInstant.getEntryPointAsync().then((function (t) {
                    initGoogleAnalytics(n, t)
                })).catch((function () {
                    initGoogleAnalytics(n, "no_entry")
                })), window.__fbInstantInitiated = !0, window.__fbInstantLoadingTimer = setInterval((
                    function () {
                        FBInstant.setLoadingProgress(t++), t >= 30 && clearInterval(window
                            .__fbInstantLoadingTimer)
                    }), 80)
            }))
        }

        function initGoogleAnalytics(t, n) {
            window.__GA_CONFIG.GAME_NAME;
            var i = window.__GA_CONFIG.BUILD_VERSION,
                a = window.__GA_CONFIG.GA_MEASUREMENT_ID;
            if ("null" != a) {
                var e = FBInstant.getEntryPointData() || {},
                    s = e.fbig_ad_id,
                    o = e.fbig_adset_id,
                    _ = e.fbig_campaign_id,
                    g = document.createElement("script");
                g.async = !0, g.src = "",
                    gtag("set", "client_storage", "none"), gtag("set", "client_id", "100." + t), gtag("set", "user_id",
                        t), gtag("set", "send_page_view", !1), gtag("js", new Date), gtag("config", a, {
                        cookie_flags: "SameSite=None;Secure",
                        build: i,
                        medium: n,
                        campaign: _,
                        groups: "GA"
                    }), gtag("set", "user_properties", {
                        user_id: t,
                        traffic_source: n,
                        campaign_id: _,
                        adset_id: o,
                        ad_id: s
                    }), gtag("event", "app_launch", {
                        send_to: "GA"
                    }), window.__analyticsInitiated = !0
            } else window.__analyticsInitiated = !0
        }
        initFbInstant();
    </script>
    <script defer="defer" src="vendors.bundle.js"></script>
    <script defer="defer" src="engine.bundle.js"></script>
    <script defer="defer" src="game.bundle.js"></script>

    <!-- Adsgram SDK -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

    <!-- Ad Layer -->
    <div id="tg-ad-layer">
        <div id="tg-score-toast">+200 pts</div>
        <button id="tg-reward-btn" onclick="tgShowRewardAd()">📺 Watch Ad +200 pts</button>
    </div>

    <script>
    (function () {
        window.Telegram && window.Telegram.WebApp && (
            window.Telegram.WebApp.ready(),
            window.Telegram.WebApp.expand()
        );

        var AdController = null;
        var IntAdController = null;

        // 从 ID.txt 读取广告 Block ID，格式：KEY=VALUE，每行一条
        function loadConfig(cb) {
            fetch('ID.txt?_=' + Date.now())
                .then(function (r) { return r.text(); })
                .then(function (text) {
                    var cfg = {};
                    text.split('\n').forEach(function (line) {
                        var parts = line.trim().split('=');
                        if (parts.length === 2) cfg[parts[0].trim()] = parts[1].trim();
                    });
                    cb(cfg);
                })
                .catch(function () { cb({}); });
        }

        function initAds(cfg) {
            if (!window.Adsgram) return;
            var rewardId = cfg['REWARD_BLOCK_ID'] || '';
            var intId    = cfg['INT_BLOCK_ID']    || '';
            try { if (rewardId) AdController    = window.Adsgram.init({ blockId: rewardId }); } catch(e) {}
            try { if (intId)    IntAdController = window.Adsgram.init({ blockId: intId });    } catch(e) {}

            document.getElementById('tg-reward-btn').style.display = 'block';
            startIntAdTimer();
        }

        function waitAndInit(cfg) {
            if (window.Adsgram) {
                initAds(cfg);
            } else {
                var sdkCheck = setInterval(function () {
                    if (window.Adsgram) { clearInterval(sdkCheck); initAds(cfg); }
                }, 300);
            }
        }

        // 先加载配置，再初始化广告
        loadConfig(function (cfg) {
            waitAndInit(cfg);
        });

        // 激励广告：看完 +200 分
        window.tgShowRewardAd = function () {
            if (!AdController) return;
            var btn = document.getElementById('tg-reward-btn');
            btn.disabled = true;
            AdController.show().then(function () {
                // 通知游戏加分（Cocos 脚本可覆盖此函数）
                if (typeof window.onAdsgramReward === 'function') {
                    window.onAdsgramReward(200);
                }
                // 浮动提示
                var toast = document.getElementById('tg-score-toast');
                toast.style.display = 'block';
                toast.style.animation = 'none';
                setTimeout(function () {
                    toast.style.animation = 'floatUp 1.2s ease forwards';
                    setTimeout(function () { toast.style.display = 'none'; }, 1200);
                }, 20);
                // 60 秒冷却
                var cd = 60;
                btn.textContent = '⏳ ' + cd + 's';
                var cdTimer = setInterval(function () {
                    cd--;
                    if (cd <= 0) {
                        clearInterval(cdTimer);
                        btn.disabled = false;
                        btn.textContent = '📺 Watch Ad +200 pts';
                    } else {
                        btn.textContent = '⏳ ' + cd + 's';
                    }
                }, 1000);
            }).catch(function () {
                btn.disabled = false;
            });
        };

        // 插屏广告：每 30 秒自动弹出
        var intAdInterval = null;
        function startIntAdTimer() {
            intAdInterval = setInterval(function () {
                if (!IntAdController) return;
                IntAdController.show().then(function () {}).catch(function () {});
            }, 30000);
        }
    })();
    </script>

</body>

</html>
